<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nib</title>
    <!--
      Anti-flash: set data-theme on <html> BEFORE first paint / before main.tsx loads.
      'system' resolves to the OS preference via prefers-color-scheme so the very first
      paint already uses the correct token values (no white flash on dark mode).
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('nib-theme') || 'system';
          var resolved =
            stored === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : stored;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themePref = stored;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
